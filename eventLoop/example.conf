server {
    listen 8000
    server_name example.com
    location / {
        root /var/www/html
    }
    location /api {
        root /var/www/api
    }
    location /def {
        root /var/www/default
    }
}

server {
    listen 5050
    server_name example.org
    location / {
        root /opt/site
    }
}